<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Montserrat', sans-serif;
}

/* TIMER NORMAL */
#timer {
    color: #ffffff;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 1px;
    text-shadow:
        0 0 6px rgba(255,255,255,0.6),
        0 0 12px rgba(255,255,255,0.3);
    transition: all 0.3s ease;
}

/* 🔥 ÚLTIMOS 30 SEGUNDOS */
.urgent {
    color: #ff2b2b;
    text-shadow:
        0 0 6px rgba(255,0,0,0.8),
        0 0 12px rgba(255,0,0,0.6),
        0 0 20px rgba(255,0,0,0.5);
    animation: pulse 0.6s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div id="timer">05:00</div>

<script>
let total = 300;

function format(s){
    let m = Math.floor(s/60);
    let sec = s % 60;
    return (m<10?'0':'')+m+':' + (sec<10?'0':'')+sec;
}

function run(){
    const el = document.getElementById("timer");

    el.innerHTML = format(total);

    // 🔥 ativa urgência nos últimos 30s
    if(total <= 30){
        el.classList.add("urgent");
    }

    if(total > 0){
        total--;
        setTimeout(run,1000);
    }
}

run();
</script>

</body>
</html>
