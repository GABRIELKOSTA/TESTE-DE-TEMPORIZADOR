<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    background: transparent;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Montserrat', sans-serif;
}

/* TEXTO */
#label {
    font-size: 11px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 2px;
    letter-spacing: 0.5px;
}

/* TIMER */
#timer {
    color: #ffffff;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 1px;
    text-shadow:
        0 0 6px rgba(255,255,255,0.6),
        0 0 12px rgba(255,255,255,0.3);
    transition: all 0.3s ease;
}

/* URGÊNCIA */
.urgent {
    animation: blink 0.6s infinite, pulse 0.6s infinite;
}

/* piscar branco ↔ vermelho */
@keyframes blink {
    0% {
        color: #ffffff;
        text-shadow:
            0 0 6px rgba(255,255,255,0.8),
            0 0 12px rgba(255,255,255,0.5);
    }

    50% {
        color: #ff2b2b;
        text-shadow:
            0 0 6px rgba(255,0,0,0.9),
            0 0 12px rgba(255,0,0,0.7),
            0 0 20px rgba(255,0,0,0.6);
    }

    100% {
        color: #ffffff;
        text-shadow:
            0 0 6px rgba(255,255,255,0.8),
            0 0 12px rgba(255,255,255,0.5);
    }
}

/* zoom */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div id="label">A OFERTA TERMINA EM</div>
<div id="timer">00:05:00</div>

<script>
// =======================
// 🔥 CONFIGURAÇÃO
// =======================

// tempo padrão (em segundos)
const params = new URLSearchParams(window.location.search);

const DURATION = parseInt(params.get("time")) || 300; 
// exemplos:
// 300 = 5min
// 3600 = 1h
// 86400 = 24h

const SHOW_HOURS = true; // true = HH:MM:SS | false = MM:SS

// ID do usuário
const userId = params.get("user") || "default";

// =======================
// 🔥 STORAGE
// =======================

const storageKey = "timer_" + userId;

let endTime = localStorage.getItem(storageKey);

if (!endTime) {
    endTime = Date.now() + DURATION * 1000;
    localStorage.setItem(storageKey, endTime);
}

// =======================
// 🔥 FORMATADOR
// =======================

function format(seconds){

    let h = Math.floor(seconds / 3600);
    let m = Math.floor((seconds % 3600) / 60);
    let s = seconds % 60;

    if (SHOW_HOURS || h > 0) {
        return (
            (h < 10 ? '0' : '') + h + ':' +
            (m < 10 ? '0' : '') + m + ':' +
            (s < 10 ? '0' : '') + s
        );
    } else {
        return (
            (m < 10 ? '0' : '') + m + ':' +
            (s < 10 ? '0' : '') + s
        );
    }
}

// =======================
// 🔥 LOOP
// =======================

function run(){
    const now = Date.now();
    let remaining = Math.floor((endTime - now) / 1000);

    const timerEl = document.getElementById("timer");
    const labelEl = document.getElementById("label");

    if (remaining <= 0) {
        timerEl.innerHTML = SHOW_HOURS ? "00:00:00" : "00:00";
        labelEl.innerHTML = "OFERTA ENCERRADA";
        return;
    }

    timerEl.innerHTML = format(remaining);

    // 🔥 últimos 30s
    if (remaining <= 30) {
        timerEl.classList.add("urgent");
        labelEl.innerHTML = "ÚLTIMOS SEGUNDOS";
    }

    requestAnimationFrame(run);
}

run();
</script>

</body>
</html>
