<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    background: transparent;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Montserrat', sans-serif;
}

/* TEXTO ACIMA */
#label {
    font-size: 11px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 2px;
    letter-spacing: 0.5px;
}

/* TIMER NORMAL */
#timer {
    color: #ffffff;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 1px;
    text-shadow:
        0 0 6px rgba(255,255,255,0.6),
        0 0 12px rgba(255,255,255,0.3);
    transition: all 0.3s ease;
}

/* 🔥 URGÊNCIA (pisca vermelho + branco) */
.urgent {
    animation: blink 0.6s infinite, pulse 0.6s infinite;
}

/* piscar cor */
@keyframes blink {
    0% {
        color: #ffffff;
        text-shadow:
            0 0 6px rgba(255,255,255,0.8),
            0 0 12px rgba(255,255,255,0.5);
    }

    50% {
        color: #ff2b2b;
        text-shadow:
            0 0 6px rgba(255,0,0,0.9),
            0 0 12px rgba(255,0,0,0.7),
            0 0 20px rgba(255,0,0,0.6);
    }

    100% {
        color: #ffffff;
        text-shadow:
            0 0 6px rgba(255,255,255,0.8),
            0 0 12px rgba(255,255,255,0.5);
    }
}

/* zoom leve */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div id="label">A OFERTA TERMINA EM</div>
<div id="timer">05:00</div>

<script>
// 🔥 CONFIG (altera aqui o tempo)
const DURATION = 50; // 5 minutos

// 🔥 pega ID do usuário da URL
const params = new URLSearchParams(window.location.search);
const userId = params.get("user") || "default";

// 🔥 chave única por usuário
const storageKey = "timer_" + userId;

// 🔥 pega ou cria tempo inicial
let endTime = localStorage.getItem(storageKey);

if (!endTime) {
    endTime = Date.now() + DURATION * 1000;
    localStorage.setItem(storageKey, endTime);
}

function format(s){
    let m = Math.floor(s/60);
    let sec = s % 60;
    return (m<10?'0':'')+m+':' + (sec<10?'0':'')+sec;
}

function run(){
    const now = Date.now();
    let remaining = Math.floor((endTime - now) / 1000);

    const timerEl = document.getElementById("timer");
    const labelEl = document.getElementById("label");

    if (remaining <= 0) {
        timerEl.innerHTML = "00:00";
        labelEl.innerHTML = "OFERTA ENCERRADA";
        return;
    }

    timerEl.innerHTML = format(remaining);

    // 🔥 últimos 30s ativa urgência
    if (remaining <= 30) {
        timerEl.classList.add("urgent");
        labelEl.innerHTML = "ÚLTIMOS SEGUNDOS";
    }

    requestAnimationFrame(run);
}

run();
</script>

</body>
</html>
